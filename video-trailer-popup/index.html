<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <title>Video Trailer Popup</title>
  </head>
  <body>
    <div class="main-container">
      <img src="https://images.pexels.com/photos/3928528/pexels-photo-3928528.jpeg" alt="Filmmaker holding a camera as he films a scene." />
      <h1>Movie Title</h1>
      <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Dolor quisquam rem repellat tenetur, laudantium nisi voluptatum officiis reiciendis vel dolorum atque recusandae aspernatur corporis omnis veritatis, ipsum fugiat! Molestias, temporibus.</p>
      <button class="btn">Watch Now</button>
    </div>
    <div class="trailer-container active">
      <video src="trailer.mp4" controls></video>
      <i class="fa-solid fa-xmark fa-2x close-icon"></i>
    </div>
    <script src="index.js"></script>
  </body>
</html>
