<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Rotating Image Gallery</title>
  </head>
  <body>
    <div class="image-container">
      <span style="--i: 1">
        <img src="https://picsum.photos/id/237/300/200" alt="random image" />
      </span>
      <span style="--i: 2">
        <img src="https://picsum.photos/id/249/300/200" alt="random image" />
      </span>
      <span style="--i: 3">
        <img src="https://picsum.photos/id/276/300/200" alt="random image" />
      </span>
      <span style="--i: 4">
        <img src="https://picsum.photos/id/202/300/200" alt="random image" />
      </span>
      <span style="--i: 5">
        <img src="https://picsum.photos/id/299/300/200" alt="random image" />
      </span>
      <span style="--i: 6">
        <img src="https://picsum.photos/id/206/300/200" alt="random image" />
      </span>
      <span style="--i: 7">
        <img src="https://picsum.photos/id/404/300/200" alt="random image" />
      </span>
      <span style="--i: 1">
        <img src="https://picsum.photos/id/316/300/200" alt="random image" />
      </span>
    </div>
    <div class="btn-container">
      <button class="btn" id="prev">Prev</button>
      <button class="btn" id="next">Next</button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
